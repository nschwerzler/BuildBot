<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>2048 — h4x3r Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Arial', sans-serif; background: #faf8ef; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { width: 500px; }
    h1 { font-size: 60px; font-weight: bold; color: #776e65; margin-bottom: 10px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .scores { display: flex; gap: 8px; }
    .score-box { background: #bbada0; color: #fff; padding: 8px 20px; border-radius: 6px; text-align: center; min-width: 80px; }
    .score-box .label { font-size: 11px; text-transform: uppercase; opacity: 0.7; }
    .score-box .value { font-size: 22px; font-weight: bold; }
    .above-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .game-intro { color: #776e65; font-size: 16px; }
    .retry-button, .keep-playing-button { background: #8f7a66; color: #f9f6f2; border: none; padding: 8px 18px; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .retry-button:hover, .keep-playing-button:hover { background: #9f8b76; }
    .game-container { position: relative; width: 500px; height: 500px; background: #bbada0; border-radius: 8px; padding: 15px; }
    .grid-container { position: absolute; z-index: 1; }
    .grid-row { margin-bottom: 15px; }
    .grid-row:last-child { margin-bottom: 0; }
    .grid-cell { width: 106px; height: 106px; background: rgba(238,228,218,0.35); border-radius: 4px; display: inline-block; margin-right: 15px; }
    .grid-cell:last-child { margin-right: 0; }
    .tile-container { position: absolute; z-index: 2; width: 470px; height: 470px; }
    .tile { position: absolute; width: 106px; height: 106px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 45px; transition: all 0.12s ease; }
    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 40px; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 40px; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 40px; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 32px; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 32px; }
    .tile-4096 { background: #3c3a32; color: #f9f6f2; font-size: 28px; }
    .tile-8192 { background: #3c3a32; color: #f9f6f2; font-size: 28px; }
    .tile-16384 { background: #3c3a32; color: #f9f6f2; font-size: 24px; }
    .tile-32768 { background: #3c3a32; color: #f9f6f2; font-size: 24px; }
    .tile-65536 { background: #3c3a32; color: #f9f6f2; font-size: 22px; }
    .tile-131072 { background: #3c3a32; color: #f9f6f2; font-size: 20px; }
    .game-message { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(238,228,218,0.73); z-index: 100; border-radius: 8px; flex-direction: column; align-items: center; justify-content: center; }
    .game-message.game-won, .game-message.game-over { display: flex; }
    .game-message p { font-size: 48px; font-weight: bold; color: #776e65; margin-bottom: 20px; }
    .game-message .actions { display: flex; gap: 10px; }
    .stats { margin-top: 15px; color: #776e65; font-size: 13px; }
    .stats span { font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>
  </div>
  <div class="above-game">
    <p class="game-intro">h4x3r Edition — no ads, no refreshes, pure 2048</p>
    <button class="retry-button" onclick="newGame()">New Game</button>
  </div>
  <div class="game-container">
    <div class="grid-container">
      <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
      <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
      <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
      <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
    </div>
    <div class="tile-container" id="tiles"></div>
    <div class="game-message" id="message">
      <p id="msg-text"></p>
      <div class="actions">
        <button class="retry-button" onclick="newGame()">Try again</button>
        <button class="keep-playing-button" id="keep-btn" onclick="keepPlaying()" style="display:none">Keep going</button>
      </div>
    </div>
  </div>
  <div class="stats">
    Games: <span id="stat-games">0</span> | 
    Best Tile: <span id="stat-best">0</span> | 
    Moves: <span id="stat-moves">0</span>
  </div>
</div>
<script>
const SIZE = 4;
let grid, score, bestScore, moveCount, won, keepGoing;

function init() {
  bestScore = parseInt(localStorage.getItem('h2048_best') || '0');
  document.getElementById('best').textContent = bestScore;
  newGame();
}

function newGame() {
  grid = Array.from({length:SIZE}, () => Array(SIZE).fill(0));
  score = 0; moveCount = 0; won = false; keepGoing = false;
  document.getElementById('message').className = 'game-message';
  document.getElementById('score').textContent = '0';
  addRandom(); addRandom();
  render();
}

function addRandom() {
  const empty = [];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(grid[r][c]===0) empty.push([r,c]);
  if(empty.length === 0) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  const container = document.getElementById('tiles');
  container.innerHTML = '';
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    if(grid[r][c] === 0) continue;
    const tile = document.createElement('div');
    const val = grid[r][c];
    tile.className = `tile tile-${val} tile-position-${c+1}-${r+1}`;
    tile.style.left = (c * 121 + 0) + 'px';
    tile.style.top = (r * 121 + 0) + 'px';
    tile.textContent = val;
    container.appendChild(tile);
  }
  document.getElementById('score').textContent = score;
  document.getElementById('stat-moves').textContent = moveCount;
  if(score > bestScore) {
    bestScore = score;
    localStorage.setItem('h2048_best', bestScore);
    document.getElementById('best').textContent = bestScore;
  }
  const maxTile = Math.max(...grid.flat());
  document.getElementById('stat-best').textContent = maxTile;
}

function slideRow(row) {
  let r = row.filter(x => x > 0);
  let newRow = [];
  let s = 0;
  for(let i = 0; i < r.length; i++) {
    if(i < r.length-1 && r[i] === r[i+1]) {
      const merged = r[i]*2;
      newRow.push(merged);
      s += merged;
      i++;
    } else {
      newRow.push(r[i]);
    }
  }
  while(newRow.length < SIZE) newRow.push(0);
  return {row: newRow, score: s};
}

function moveGrid(dir) {
  let moved = false;
  let addScore = 0;
  let newGrid = grid.map(r => [...r]);
  
  if(dir === 0) { // left
    for(let r=0;r<SIZE;r++) {
      const res = slideRow(newGrid[r]);
      if(res.row.join() !== newGrid[r].join()) moved = true;
      newGrid[r] = res.row; addScore += res.score;
    }
  } else if(dir === 1) { // up
    for(let c=0;c<SIZE;c++) {
      const col = newGrid.map(row => row[c]);
      const res = slideRow(col);
      if(res.row.join() !== col.join()) moved = true;
      for(let r=0;r<SIZE;r++) newGrid[r][c] = res.row[r];
      addScore += res.score;
    }
  } else if(dir === 2) { // right
    for(let r=0;r<SIZE;r++) {
      const rev = [...newGrid[r]].reverse();
      const res = slideRow(rev);
      const final = res.row.reverse();
      if(final.join() !== newGrid[r].join()) moved = true;
      newGrid[r] = final; addScore += res.score;
    }
  } else { // down
    for(let c=0;c<SIZE;c++) {
      const col = newGrid.map(row => row[c]).reverse();
      const res = slideRow(col);
      const final = res.row.reverse();
      if(final.join() !== newGrid.map(row=>row[c]).join()) moved = true;
      for(let r=0;r<SIZE;r++) newGrid[r][c] = final[r];
      addScore += res.score;
    }
  }
  
  if(moved) {
    grid = newGrid;
    score += addScore;
    moveCount++;
    addRandom();
    render();
    
    const maxTile = Math.max(...grid.flat());
    if(maxTile >= 2048 && !won && !keepGoing) {
      won = true;
      document.getElementById('msg-text').textContent = 'You win!';
      document.getElementById('keep-btn').style.display = '';
      document.getElementById('message').className = 'game-message game-won';
    }
    
    if(!canMove()) {
      document.getElementById('msg-text').textContent = 'Game over!';
      document.getElementById('keep-btn').style.display = 'none';
      document.getElementById('message').className = 'game-message game-over';
    }
  }
  return moved;
}

function canMove() {
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    if(grid[r][c] === 0) return true;
    if(c < SIZE-1 && grid[r][c] === grid[r][c+1]) return true;
    if(r < SIZE-1 && grid[r][c] === grid[r+1][c]) return true;
  }
  return false;
}

function keepPlaying() {
  keepGoing = true;
  document.getElementById('message').className = 'game-message';
}

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:0, ArrowUp:1, ArrowRight:2, ArrowDown:3};
  if(map[e.key] !== undefined) {
    e.preventDefault();
    if(document.getElementById('message').className.includes('game-over')) return;
    if(document.getElementById('message').className.includes('game-won') && !keepGoing) return;
    moveGrid(map[e.key]);
  }
});

init();
</script>
</body>
</html>
